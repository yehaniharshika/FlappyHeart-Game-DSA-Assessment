<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Heart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style/auth.css">
</head>
<body>

<!-- FLOATING HEARTS BACKGROUND -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- MAIN CONTENT -->
<div class="auth-wrapper">

    <!-- TITLE SIGN -->
    <div class="title-sign">
        <div class="title-row">
            <span class="title-heart left-heart">💗</span>
            <div class="title-text-block">
                <div class="game-title">FLAPPY HEART</div>
                <div class="game-sub">TAP TO LOVE</div>
            </div>
            <span class="title-heart right-heart">💗</span>
        </div>
    </div>

    <!-- AUTH CARD -->
    <div class="auth-card" id="loginCard">
        <div class="tab-row">
            <button class="tab active" onclick="showTab('login')">LOGIN</button>
            <button class="tab" onclick="showTab('register')">REGISTER</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm">

          
            <div class="error-msg" id="loginError"></div>

            <div class="input-group">
                <input type="text" id="loginUsername" placeholder="Username" autocomplete="off"
                       oninput="clearFieldError('loginUsernameErr')">
                <span class="field-error" id="loginUsernameErr"></span>
            </div>

            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Password"
                       oninput="clearFieldError('loginPasswordErr')">
                <span class="field-error" id="loginPasswordErr"></span>
            </div>

            <button class="btn-main" onclick="handleUserLogin()">LOGIN</button>
            <div class="divider"><span>or</span></div>
            <button class="btn-google" onclick="handleGoogleLogin()">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Continue with Google
            </button>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" style="display:none">

            <div class="error-msg" id="ErrorEl"></div>

            <div class="input-group">
                <input type="text" id="registerName" placeholder="Name" autocomplete="off"
                       oninput="clearFieldError('registerNameErr')">
                <span class="field-error" id="registerNameErr"></span>
            </div>

            <div class="input-group">
                <input type="email" id="registerEmail" placeholder="Email Address"
                       oninput="clearFieldError('registerEmailErr')">
                <span class="field-error" id="registerEmailErr"></span>
            </div>

            <div class="input-group">
                <input type="password" id="registerPassword" placeholder="Password"
                       oninput="clearFieldError('registerPasswordErr')">
                <span class="field-error" id="registerPasswordErr"></span>
            </div>

            <div class="input-group">
                <input type="password" id="registerConfirmPW" placeholder="Confirm Password"
                       oninput="clearFieldError('registerConfirmErr')">
                <span class="field-error" id="registerConfirmErr"></span>
            </div>

            <button class="btn-main" onclick="handleUserRegister()">CREATE ACCOUNT</button>
        </div>

    </div>
</div>

<script src="src/js/auth.js"></script>
</body>
</html>
